<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<script src="../assets/js/page-loader.js"></script>
<title>Commandes — iStore Pro Admin</title>
  <link rel="stylesheet" href="../assets/css/global.css"/>
  <link rel="stylesheet" href="../assets/css/admin.css"/>
  <script src="../assets/js/admin.guard.js"></script>
</head>
<body class="admin-body">

  <aside class="admin-sidebar">
    <div class="admin-sidebar__logo" style="-webkit-text-fill-color:initial;background:none;padding:1rem 1.25rem;">
  <img src="../assets/images/logo-header.svg" alt="iStore Pro" style="height:34px;width:auto;filter:brightness(1.1)"/>
</div>
    <nav class="admin-sidebar__nav">
      <div class="admin-nav-section">Principal</div>
      <a href="index.html"      class="admin-nav-link"><span class="nav-icon">📊</span> Dashboard</a>
      <a href="produits.html"   class="admin-nav-link"><span class="nav-icon">📱</span> Produits</a>
      <a href="clients.html"    class="admin-nav-link"><span class="nav-icon">👥</span> Clients</a>
      <div class="admin-nav-section">Commandes</div>
      <a href="commandes.html"  class="admin-nav-link active"><span class="nav-icon">📦</span> Commandes</a>
      <div class="admin-nav-section">Crédit</div>
      <a href="dossiers.html"   class="admin-nav-link"><span class="nav-icon">📂</span> Dossiers</a>
      <a href="paiements.html"  class="admin-nav-link"><span class="nav-icon">💳</span> Paiements</a>
      <a href="quittances.html" class="admin-nav-link"><span class="nav-icon">🧾</span> Quittances</a>
      <div class="admin-nav-section">Compte</div>
      <a href="../index.html"   class="admin-nav-link"><span class="nav-icon">🌐</span> Voir le site</a>
      <a href="#" onclick="adminLogout()" class="admin-nav-link"><span class="nav-icon">🚪</span> Déconnexion</a>
    </nav>
    <div class="admin-sidebar__bottom">
      <div class="admin-user">
        <div class="admin-user__avatar" id="adminAvatar">A</div>
        <div class="admin-user__info"><strong id="adminName">Admin</strong><span>Administrateur</span></div>
      </div>
    </div>
  </aside>

  <div class="admin-main">
    <div class="admin-topbar">
      <h1 class="admin-topbar__title">Gestion des commandes</h1>
    </div>

    <div class="admin-content">

      <!-- Filtres -->
      <div style="display:flex;gap:1rem;margin-bottom:1.5rem;flex-wrap:wrap;align-items:center;">
        <select id="filterType" class="select-input" style="width:180px;">
          <option value="">Tous les types</option>
          <option value="comptant">💰 Comptant</option>
          <option value="credit">📋 Crédit</option>
        </select>
        <select id="filterStatut" class="select-input" style="width:200px;">
          <option value="">Tous les statuts</option>
          <option value="EN_ATTENTE">En attente</option>
          <option value="CONFIRMEE">Confirmée</option>
          <option value="EN_PREPARATION">En préparation</option>
          <option value="EXPEDIEE">Expédiée</option>
          <option value="LIVREE">Livrée</option>
          <option value="ANNULEE">Annulée</option>
        </select>
        <button class="btn btn--primary" onclick="loadOrders()">Filtrer</button>
        <span id="totalCount" style="font-size:var(--text-sm);color:var(--text-muted);margin-left:auto;"></span>
      </div>

      <div class="admin-card">
        <div class="admin-table-wrap">
          <table class="admin-table">
            <thead><tr>
              <th>N° Commande</th><th>Client</th><th>Produit</th>
              <th>Type</th><th>Montant</th><th>Paiement</th>
              <th>Livraison</th><th>Statut</th><th>Actions</th>
            </tr></thead>
            <tbody id="ordersBody">
              <tr><td colspan="9" style="text-align:center;padding:2rem;color:var(--text-muted);">Chargement…</td></tr>
            </tbody>
          </table>
        </div>
      </div>

    </div>
  </div>

  <!-- MODAL DÉTAIL COMMANDE -->
  <div class="modal-overlay" id="orderModal" style="display:none;">
    <div class="modal" style="max-width:660px;">
      <div class="modal__header">
        <h3>Détail de la commande</h3>
        <button class="modal__close" onclick="closeOrderModal()">✕</button>
      </div>
      <div class="modal__body" id="orderModalBody"></div>
      <div class="modal__footer" id="orderModalFooter"></div>
    </div>
  </div>

  <script src="../assets/js/utils.js"></script>
  <script src="../assets/js/api.js"></script>
  <script>
    function adminLogout() { localStorage.clear(); window.location.href='../connexion.html'; }
    const user = JSON.parse(localStorage.getItem('user') || '{}');
    document.getElementById('adminName').textContent   = user.firstname || 'Admin';
    document.getElementById('adminAvatar').textContent = (user.firstname||'A')[0].toUpperCase();

    const ORDER_LABELS = { EN_ATTENTE:'En attente', CONFIRMEE:'Confirmée', EN_PREPARATION:'En préparation', EXPEDIEE:'Expédiée', LIVREE:'Livrée ✓', ANNULEE:'Annulée' };
    const ORDER_COLORS = { EN_ATTENTE:'status--pending', CONFIRMEE:'status--active', EN_PREPARATION:'status--active', EXPEDIEE:'status--done', LIVREE:'status--done', ANNULEE:'status--error' };
    const PAY_LABEL    = { EN_ATTENTE:'En attente', VALIDE:'Validé ✓', REJETE:'Rejeté' };
    const PAY_CLASS    = { EN_ATTENTE:'status--pending', VALIDE:'status--active', REJETE:'status--error' };

    let allOrders = [];

    async function loadOrders() {
      const tbody  = document.getElementById('ordersBody');
      const type   = document.getElementById('filterType').value;
      const statut = document.getElementById('filterStatut').value;
      let url      = '/orders?limit=100';
      if (type)   url += `&typePaiement=${type}`;
      if (statut) url += `&statut=${statut}`;

      tbody.innerHTML = '<tr><td colspan="9" style="text-align:center;padding:2rem;color:var(--text-muted);">Chargement…</td></tr>';
      try {
        const res = await API.get(url, true);
        allOrders = res.orders || [];
        document.getElementById('totalCount').textContent = `${res.total || allOrders.length} commande(s)`;

        if (!allOrders.length) {
          tbody.innerHTML = '<tr><td colspan="9" style="text-align:center;padding:2rem;color:var(--text-muted);">Aucune commande.</td></tr>';
          return;
        }

        tbody.innerHTML = allOrders.map(o => `
          <tr>
            <td><strong style="font-family:monospace;color:var(--primary);font-size:var(--text-xs)">${o.numeroCommande||'—'}</strong><br>
            <small style="color:var(--text-muted)">${formatDate(o.createdAt)}</small></td>
            <td><strong>${o.client?.firstname||''} ${o.client?.lastname||''}</strong><br>
            <small style="color:var(--text-muted)">${o.client?.email||''}</small></td>
            <td>${o.product?.name||'—'}<br><small style="color:var(--text-muted)">${o.product?.storage||''}</small></td>
            <td>${o.typePaiement==='comptant'
              ? '<span class="badge badge--primary">💰 Comptant</span>'
              : '<span class="badge badge--gold">📋 Crédit</span>'}</td>
            <td><strong>${formatPrice(o.prixTotal)}</strong></td>
            <td><span class="status ${PAY_CLASS[o.statutPaiement]||'status--pending'}">${PAY_LABEL[o.statutPaiement]||o.statutPaiement||'—'}</span></td>
            <td style="font-size:var(--text-xs)">${o.adresseLivraison?.city||'—'}, ${o.adresseLivraison?.country||''}</td>
            <td><span class="status ${ORDER_COLORS[o.statut]||''}">${ORDER_LABELS[o.statut]||o.statut}</span></td>
            <td>
              <div style="display:flex;gap:.5rem;flex-wrap:wrap;">
                <button class="btn btn--outline btn--sm" onclick="openOrderModal('${o._id}')">Détail</button>
                ${o.typePaiement==='comptant' && !o.valideParAdmin && o.statutPaiement==='EN_ATTENTE'
                  ? `<button class="btn btn--success btn--sm" onclick="validerPaiement('${o._id}')">✓ Valider paiement</button>`
                  : ''}
              </div>
            </td>
          </tr>`).join('');
      } catch(e) {
        tbody.innerHTML = `<tr><td colspan="9" style="color:var(--error);text-align:center;padding:2rem;">${e.message}</td></tr>`;
      }
    }

    // ── Modal détail ──────────────────────────────────────────
    async function openOrderModal(id) {
      document.getElementById('orderModal').style.display = 'flex';
      const body   = document.getElementById('orderModalBody');
      const footer = document.getElementById('orderModalFooter');
      body.innerHTML = '<div class="loading-spinner">Chargement…</div>';
      footer.innerHTML = '';

      try {
        const o = await API.get(`/orders/${id}`, true);
        body.innerHTML = `
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;font-size:var(--text-sm);margin-bottom:1.5rem;">
            <div><span style="color:var(--text-muted)">N° Commande</span><br><strong style="font-family:monospace;color:var(--primary)">${o.numeroCommande}</strong></div>
            <div><span style="color:var(--text-muted)">Date</span><br><strong>${formatDate(o.createdAt)}</strong></div>
            <div><span style="color:var(--text-muted)">Client</span><br><strong>${o.client?.firstname} ${o.client?.lastname}</strong><br>${o.client?.email}<br>${o.client?.phone||''}</div>
            <div><span style="color:var(--text-muted)">Produit</span><br><strong>${o.product?.name} ${o.product?.storage||''}</strong><br>${o.product?.color||''}</div>
            <div><span style="color:var(--text-muted)">Type paiement</span><br><strong>${o.typePaiement==='comptant'?'💰 Comptant':'📋 Crédit'}</strong></div>
            <div><span style="color:var(--text-muted)">Montant</span><br><strong style="color:var(--primary);font-size:var(--text-lg)">${formatPrice(o.prixTotal)}</strong></div>
          </div>
          <div style="background:var(--bg-alt);border-radius:var(--radius-md);padding:1rem;margin-bottom:1.5rem;">
            <h4 style="font-size:var(--text-sm);font-weight:700;margin-bottom:.75rem;color:var(--apple-dark);">📦 Adresse de livraison</h4>
            <p style="font-size:var(--text-sm);line-height:1.7">
              <strong>${o.adresseLivraison?.fullname}</strong><br>
              ${o.adresseLivraison?.address}<br>
              ${o.adresseLivraison?.postalCode||''} ${o.adresseLivraison?.city}<br>
              ${o.adresseLivraison?.country}<br>
              📞 ${o.adresseLivraison?.phone}
              ${o.adresseLivraison?.notes ? `<br><em style="color:var(--text-muted)">Note : ${o.adresseLivraison.notes}</em>` : ''}
            </p>
          </div>
          <div style="display:flex;align-items:center;gap:1rem;flex-wrap:wrap;margin-bottom:1rem;">
            <div><span style="font-size:var(--text-xs);color:var(--text-muted)">Statut commande</span><br>
              <select id="modalStatut" class="select-input" style="width:200px;margin-top:.25rem">
                ${['EN_ATTENTE','CONFIRMEE','EN_PREPARATION','EXPEDIEE','LIVREE','ANNULEE'].map(s =>
                  `<option value="${s}" ${o.statut===s?'selected':''}>${ORDER_LABELS[s]}</option>`).join('')}
              </select>
            </div>
          </div>
          <div class="form-group">
            <label style="font-size:var(--text-sm)">Note admin</label>
            <textarea id="modalNote" class="form-input" rows="2" placeholder="Note interne…">${o.notesAdmin||''}</textarea>
          </div>`;

        footer.innerHTML = `
          <button class="btn btn--ghost" onclick="closeOrderModal()">Fermer</button>
          ${o.typePaiement==='comptant' && !o.valideParAdmin && o.statutPaiement==='EN_ATTENTE'
            ? `<button class="btn btn--success" onclick="validerPaiement('${o._id}');closeOrderModal()">✓ Valider le paiement</button>` : ''}
          <button class="btn btn--gold" onclick="updateOrderStatut('${o._id}')">Enregistrer</button>`;
      } catch(e) {
        body.innerHTML = `<p style="color:var(--error)">Erreur : ${e.message}</p>`;
      }
    }

    function closeOrderModal() { document.getElementById('orderModal').style.display = 'none'; }

    async function updateOrderStatut(id) {
      const statut    = document.getElementById('modalStatut').value;
      const notesAdmin= document.getElementById('modalNote').value;
      try {
        await API.put(`/orders/${id}/statut`, { statut, notesAdmin }, true);
        showToast('Commande mise à jour ✓', 'success');
        closeOrderModal(); loadOrders();
      } catch(e) { showToast(e.message, 'error'); }
    }

    async function validerPaiement(id) {
      if (!confirm('Valider le paiement de cette commande ? Cette action est irréversible.')) return;
      try {
        await API.put(`/orders/${id}/valider-paiement`, {}, true);
        showToast('Paiement validé. Commande confirmée ✓', 'success');
        loadOrders();
      } catch(e) { showToast(e.message, 'error'); }
    }

    document.addEventListener('DOMContentLoaded', loadOrders);
  </script>
</body>
</html>
