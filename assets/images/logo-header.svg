<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 48" width="200" height="48">
  <defs>
    <linearGradient id="lgold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"  stop-color="#FFD700"/>
      <stop offset="50%" stop-color="#C9A84C"/>
      <stop offset="100%" stop-color="#8B6914"/>
    </linearGradient>
    <linearGradient id="libg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1D1D1F"/>
      <stop offset="100%" stop-color="#0a0f1e"/>
    </linearGradient>
    <linearGradient id="ltxt" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"  stop-color="#ffffff"/>
      <stop offset="70%" stop-color="#f0f0f0"/>
      <stop offset="100%" stop-color="#C9A84C"/>
    </linearGradient>
    <filter id="lsh">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="rgba(201,168,76,0.4)"/>
    </filter>
  </defs>

  <!-- Icône fond -->
  <rect x="2" y="4" width="40" height="40" rx="10" fill="url(#libg)" filter="url(#lsh)"/>
  <rect x="2" y="4" width="40" height="40" rx="10" fill="none" stroke="url(#lgold)" stroke-width="1.2" opacity="0.7"/>
  <rect x="2" y="4" width="20" height="20" rx="10 0 0 0" fill="rgba(255,255,255,0.04)"/>

  <!-- i point -->
  <circle cx="22" cy="14" r="3" fill="url(#lgold)"/>
  <!-- i corps -->
  <rect x="19.5" y="19.5" width="5" height="16" rx="2.5" fill="url(#lgold)"/>
  <!-- soulignement -->
  <rect x="15" y="35" width="14" height="1.5" rx="0.75" fill="url(#lgold)" opacity="0.5"/>

  <!-- Étoile déco -->
  <g transform="translate(35,11)" opacity="0.85">
    <polygon points="0,-3.5 0.85,-0.85 3.5,0 0.85,0.85 0,3.5 -0.85,0.85 -3.5,0 -0.85,-0.85"
             fill="url(#lgold)"/>
  </g>

  <!-- Texte iStore -->
  <text x="50" y="32"
        font-family="-apple-system,'SF Pro Display',BlinkMacSystemFont,Helvetica,Arial,sans-serif"
        font-size="23" font-weight="800" letter-spacing="-1"
        fill="url(#ltxt)">iStore</text>

  <!-- Badge PRO -->
  <rect x="140" y="17" width="36" height="17" rx="5" fill="url(#lgold)"/>
  <rect x="140" y="17" width="36" height="8.5" rx="5 5 0 0" fill="rgba(255,255,255,0.15)"/>
  <text x="158" y="29.5"
        font-family="-apple-system,BlinkMacSystemFont,Helvetica,Arial,sans-serif"
        font-size="9.5" font-weight="800" letter-spacing="0.5"
        text-anchor="middle" fill="#1D1D1F">PRO</text>

  <!-- Ligne déco -->
  <line x1="50" y1="36" x2="136" y2="36" stroke="url(#lgold)" stroke-width="0.8" opacity="0.25"/>

  <!-- Tagline micro -->
  <text x="50" y="44"
        font-family="-apple-system,BlinkMacSystemFont,Helvetica,Arial,sans-serif"
        font-size="7" font-weight="500" letter-spacing="1.8"
        fill="rgba(201,168,76,0.65)">SPÉCIALISTE iPhone</text>
</svg>
