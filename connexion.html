<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<script src="assets/js/page-loader.js"></script>
<title>Connexion — iStore Pro</title>
  <link rel="stylesheet" href="assets/css/global.css"/>
  <link rel="stylesheet" href="assets/css/components.css"/>
  <link rel="stylesheet" href="assets/css/pages/auth.css"/>
</head>
<body class="auth-page">
<a href="index.html" class="auth-logo"><img src="assets/images/logo.svg" alt="iStore Pro" style="height:52px;width:auto;filter:drop-shadow(0 2px 8px rgba(201,168,76,0.3))"/></a>
<div class="auth-card">
  <div class="auth-tabs">
    <button class="auth-tab active" id="tabLogin"    onclick="switchTab('login')">Connexion</button>
    <button class="auth-tab"        id="tabRegister" onclick="switchTab('register')">Créer un compte</button>
  </div>
  <div id="authAlert" class="alert" style="display:none"></div>

  <!-- LOGIN -->
  <div id="loginPanel">
    <div class="form-group"><label>Email</label><input type="email" id="loginEmail" class="form-input" placeholder="votre@email.com"/></div>
    <div class="form-group">
      <label>Mot de passe</label>
      <div class="input-password-wrap">
        <input type="password" id="loginPassword" class="form-input" placeholder="••••••••"/>
        <button class="btn-eye" onclick="togglePwd('loginPassword')">👁</button>
      </div>
    </div>
    <button class="btn btn--primary btn--full" id="loginBtn">Se connecter</button>
    <p class="auth-footer-link">Pas encore de compte ? <a href="#" onclick="switchTab('register')">Créer un compte</a></p>
  </div>

  <!-- REGISTER -->
  <div id="registerPanel" style="display:none">
    <div class="form-row">
      <div class="form-group"><label>Prénom</label><input type="text" id="regFirstname" class="form-input" placeholder="Jean"/></div>
      <div class="form-group"><label>Nom</label><input type="text" id="regLastname" class="form-input" placeholder="Dupont"/></div>
    </div>
    <div class="form-group"><label>Email</label><input type="email" id="regEmail" class="form-input" placeholder="votre@email.com"/></div>
    <div class="form-group"><label>Téléphone</label><input type="tel" id="regPhone" class="form-input" placeholder="+33 6 00 00 00 00"/></div>
    <div class="form-group">
      <label>Mot de passe</label>
      <div class="input-password-wrap">
        <input type="password" id="regPassword" class="form-input" placeholder="Min. 8 caractères"/>
        <button class="btn-eye" onclick="togglePwd('regPassword')">👁</button>
      </div>
    </div>
    <div class="form-group"><label>Confirmer</label><input type="password" id="regConfirm" class="form-input" placeholder="••••••••"/></div>
    <button class="btn btn--primary btn--full" id="registerBtn">Créer mon compte</button>
    <p class="auth-footer-link">Déjà un compte ? <a href="#" onclick="switchTab('login')">Se connecter</a></p>
  </div>
</div>

<script src="assets/js/utils.js"></script>
<script src="assets/js/api.js"></script>
<script src="assets/js/auth.js"></script>
<script>
if (window.location.hash === '#register') switchTab('register');

function switchTab(tab) {
  document.getElementById('loginPanel').style.display    = tab==='login'    ? 'block' : 'none';
  document.getElementById('registerPanel').style.display = tab==='register' ? 'block' : 'none';
  document.getElementById('tabLogin').classList.toggle('active',    tab==='login');
  document.getElementById('tabRegister').classList.toggle('active', tab==='register');
}
function togglePwd(id) {
  const el = document.getElementById(id);
  el.type = el.type === 'password' ? 'text' : 'password';
}

document.getElementById('loginBtn').addEventListener('click', async () => {
  const email    = document.getElementById('loginEmail').value.trim();
  const password = document.getElementById('loginPassword').value;
  const alertEl  = document.getElementById('authAlert');
  if (!email || !password) { showAlert(alertEl,'error','Veuillez remplir tous les champs.'); return; }
  try {
    const res = await API.post('/auth/login', { email, password });
    localStorage.setItem('token', res.token);
    localStorage.setItem('user', JSON.stringify(res.user));
    const redirect = new URLSearchParams(window.location.search).get('redirect');
        window.location.href = res.user.role === 'admin' ? 'admin/index.html' : (redirect || 'espace-client.html');
  } catch(e) { showAlert(alertEl,'error', e.message || 'Email ou mot de passe incorrect.'); }
});

document.getElementById('registerBtn').addEventListener('click', async () => {
  const firstname = document.getElementById('regFirstname').value.trim();
  const lastname  = document.getElementById('regLastname').value.trim();
  const email     = document.getElementById('regEmail').value.trim();
  const phone     = document.getElementById('regPhone').value.trim();
  const password  = document.getElementById('regPassword').value;
  const confirm   = document.getElementById('regConfirm').value;
  const alertEl   = document.getElementById('authAlert');
  if (!firstname || !lastname || !email || !password) { showAlert(alertEl,'error','Champs obligatoires manquants.'); return; }
  if (password !== confirm) { showAlert(alertEl,'error','Les mots de passe ne correspondent pas.'); return; }
  if (password.length < 8) { showAlert(alertEl,'error','Mot de passe trop court (min. 8 caractères).'); return; }
  try {
    const res = await API.post('/auth/register', { firstname, lastname, email, phone, password });
    localStorage.setItem('token', res.token);
    localStorage.setItem('user', JSON.stringify(res.user));
    window.location.href = 'espace-client.html';
  } catch(e) { showAlert(alertEl,'error', e.message || 'Erreur lors de la création du compte.'); }
});
</script>
</body>
</html>
